# Semgrep SAST scan. Runs on every PR, push to default branch, and weekly.
# Free OSS rule packs; no Semgrep account required.
name: Semgrep

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Static analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --metrics=off \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='.next' \
            --exclude='vendor' \
            --exclude='*.min.js'
